<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blueprint background -->
  <rect width="32" height="32" rx="5" fill="#002A5E"/>
  <!-- Grid lines horizontal -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="#0074FF" stroke-width="0.4" opacity="0.35"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#0074FF" stroke-width="0.4" opacity="0.35"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#0074FF" stroke-width="0.4" opacity="0.35"/>
  <!-- Grid lines vertical -->
  <line x1="8" y1="0" x2="8" y2="32" stroke="#0074FF" stroke-width="0.4" opacity="0.35"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="#0074FF" stroke-width="0.4" opacity="0.35"/>
  <line x1="24" y1="0" x2="24" y2="32" stroke="#0074FF" stroke-width="0.4" opacity="0.35"/>
  <!-- Corner crosshairs -->
  <line x1="2" y1="4" x2="6" y2="4" stroke="#0074FF" stroke-width="0.6" opacity="0.7"/>
  <line x1="4" y1="2" x2="4" y2="6" stroke="#0074FF" stroke-width="0.6" opacity="0.7"/>
  <line x1="26" y1="4" x2="30" y2="4" stroke="#0074FF" stroke-width="0.6" opacity="0.7"/>
  <line x1="28" y1="2" x2="28" y2="6" stroke="#0074FF" stroke-width="0.6" opacity="0.7"/>
  <line x1="2" y1="28" x2="6" y2="28" stroke="#0074FF" stroke-width="0.6" opacity="0.7"/>
  <line x1="4" y1="26" x2="4" y2="30" stroke="#0074FF" stroke-width="0.6" opacity="0.7"/>
  <line x1="26" y1="28" x2="30" y2="28" stroke="#0074FF" stroke-width="0.6" opacity="0.7"/>
  <line x1="28" y1="26" x2="28" y2="30" stroke="#0074FF" stroke-width="0.6" opacity="0.7"/>
  <!-- OK text -->
  <text x="16" y="21.5" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">OK</text>
  <!-- Outer border -->
  <rect width="32" height="32" rx="5" fill="none" stroke="#0074FF" stroke-width="1.2" opacity="0.7"/>
</svg>
